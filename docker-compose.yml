services:
  agent:
    build: .
    image: starry-code:local
    container_name: starry-code
    env_file:
      - .env
    environment:
      # Inside compose, prefer compose-network hostnames (e.g. qdrant) over
      # whatever public URLs the .env file holds. Override as needed.
      SESSIONS_DIR: /app/sessions
      # When using the bundled qdrant service below, set:
      # VECTOR_BACKEND: qdrant
      # QDRANT_URL: http://qdrant:6333
    volumes:
      - ./sessions:/app/sessions
    stdin_open: true   # for `docker compose run ... -it`
    tty: true
    restart: unless-stopped
    # No default command — let cli.py run with no --session so it auto-names
    # the session to a Chinese slug after the first turn (window title updates
    # to match). Override per-invocation to pin a session name:
    #   docker compose run --rm agent --session weather
    #   docker compose run --rm agent --once "what is 2+2?"

    # To enable hot-reload during development, run `docker compose watch`
    # in another terminal. It will rebuild the image + restart the
    # container automatically when files under ./agent, ./cli.py, or
    # ./requirements.txt change. Use plain `docker compose run` for
    # one-shot / non-watch workflows.
    develop:
      watch:
        # Action: rebuild the image AND restart the running container.
        - path: ./starry_code
          action: rebuild
          ignore:
            - __pycache__/
            - "**/*.pyc"
        - path: ./cli.py
          action: rebuild
        - path: ./requirements.txt
          action: rebuild
        - path: ./Dockerfile
          action: rebuild
        # Sync (no rebuild needed for pure data/config):
        - path: ./demo
          action: sync
          target: /app/demo
        - path: ./.env.example
          action: sync
          target: /.env.example

  # Optional bundled vector store. Uncomment to use, then update .env:
  #   VECTOR_BACKEND=qdrant
  #   QDRANT_URL=http://qdrant:6333
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: starry-code-qdrant
  #   ports:
  #     - "6333:6333"   # web UI / REST
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   restart: unless-stopped

  # Optional bundled short-term store. Uncomment to use, then update .env:
  #   SHORT_TERM_BACKEND=redis
  #   REDIS_URL=redis://redis:6379/0
  # redis:
  #   image: redis:7-alpine
  #   container_name: starry-code-redis
  #   restart: unless-stopped

